<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
</head>

<body>

<h2>Admin Login</h2>

<form onsubmit="login(event)">

Username<br>
<input id="username"><br><br>

Password<br>
<input id="password" type="password"><br><br>

<button>Login</button>

</form>


<script>

function login(e) {

e.preventDefault();

const username =
document.getElementById("username").value;

const password =
document.getElementById("password").value;


fetch("http://localhost:3000/login", {

method: "POST",

headers: {
"Content-Type": "application/json"
},

body: JSON.stringify({
username,
password
})

})
.then(res => res.text())
.then(msg => {

if (msg === "ok") {

window.location = "admin.html";

} else {

alert("Wrong login");

}

});

}

</script>

</body>
</html>
